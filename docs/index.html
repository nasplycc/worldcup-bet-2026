<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AI智球 · 赛事看板</title>
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  color-scheme:dark;
  --bg:#0f141a;--bar:#121820;--surface:#171e26;--surface-2:#1d2630;--card:#202933;
  --line:#283440;--line-soft:#23303b;--text:#edf3f8;--text-strong:#fff;--muted:#8fa2b5;
  --blue:#2d8cff;--blue-soft:#0d3c62;--green:#2bc276;--amber:#f4c95d;--red:#ef4e55;--shadow:0 14px 32px rgba(0,0,0,.22)
}
body.light{
  color-scheme:light;
  --bg:#eef3f8;--bar:#ffffff;--surface:#ffffff;--surface-2:#f4f7fb;--card:#ffffff;
  --line:#cfd9e5;--line-soft:#e1e8f0;--text:#172331;--text-strong:#0b1622;--muted:#52677a;
  --blue:#1769e0;--blue-soft:#e6f0ff;--green:#0f7a45;--amber:#9a6a00;--red:#c9363d;--shadow:0 10px 28px rgba(22,35,49,.10)
}
html,body{min-height:100%;font-family:'Noto Sans SC',system-ui,sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased}
body{padding-top:72px}button,input{font:inherit}button{cursor:pointer}a{color:inherit;text-decoration:none}
.topbar{position:fixed;top:0;left:0;right:0;z-index:50;height:72px;background:var(--bar);border-bottom:1px solid var(--line-soft);display:grid;grid-template-columns:220px minmax(260px,760px) auto;align-items:center;gap:18px;padding:0 28px}
.logo{display:flex;align-items:center;gap:10px;font-size:22px;font-weight:800;white-space:nowrap}.logo svg{width:31px;height:31px}.logo small{font-size:12px;color:#9fb4c8;font-weight:700;margin-left:2px}
.search{height:42px;background:#1b232c;border:1px solid var(--line);border-radius:10px;padding:0 14px;display:flex;align-items:center;gap:10px;color:var(--muted);min-width:0;white-space:nowrap}.search input{width:100%;min-width:0;background:transparent;border:0;outline:0;color:var(--text);font-size:15px}.search input::placeholder{color:var(--muted)}.search-label{white-space:nowrap;flex:none}
.auth{display:flex;align-items:center;gap:10px;justify-content:flex-end}.auth button{height:35px;border-radius:9px;padding:0 16px;font-weight:700;white-space:nowrap}.login{border:1px solid #3a4653;background:transparent;color:#dce7f0}.signup{border:1px solid var(--blue);background:var(--blue);color:white}.toggle-group{display:flex;height:35px;border:1px solid var(--line);border-radius:9px;overflow:hidden;background:var(--surface-2)}.toggle-group button{height:33px;border:0;border-radius:0;padding:0 10px;background:transparent;color:var(--muted);font-size:13px}.toggle-group button.active{background:var(--blue-soft);color:#49b2ff}.light .login{color:var(--text);border-color:#b8c6d5;background:#fff}.light .signup{box-shadow:0 5px 14px rgba(23,105,224,.18)}.light .toggle-group{background:#f3f7fb;border-color:#cad7e4}.light .toggle-group button{color:#52677a}.light .toggle-group button.active{background:#dbeafe;color:#0f5ec7}
.wrap{max-width:1540px;margin:0 auto;padding:24px 28px 56px}.board-head{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:16px}.board-head h1{font-size:24px;line-height:1.2;font-weight:800}.summary{color:var(--muted);font-size:13px;font-weight:700;white-space:nowrap}
.league-tabs,.quick-filters{display:flex;gap:10px;overflow:auto;scrollbar-width:none}.league-tabs::-webkit-scrollbar,.quick-filters::-webkit-scrollbar{display:none}
.league-tabs{margin-bottom:12px}.quick-filters{align-items:center;margin-bottom:22px;flex-wrap:wrap}
.tab{height:36px;padding:0 15px;border:0;background:transparent;color:#8fa3b7;border-radius:8px;font-size:14px;font-weight:700;white-space:nowrap}.tab.active{background:var(--blue-soft);color:#49b2ff}.light .tab{color:#5c7083}.light .tab.active{background:#dbeafe;color:#0f5ec7}
.quick-btn{height:36px;padding:0 15px;border:1px solid var(--line);border-radius:8px;background:var(--surface-2);color:#8fa3b7;font-size:14px;font-weight:700;white-space:nowrap}
.quick-btn.active{background:var(--blue-soft);color:#49b2ff;border-color:var(--blue-soft)}
.section-block{margin-top:22px}.section-title{font-size:17px;font-weight:800;margin-bottom:12px;color:var(--text-strong)}
.cards{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:16px}.match-card{background:var(--card);border:1px solid var(--line);border-radius:8px;min-height:206px;padding:14px;display:grid;grid-template-rows:auto 1fr auto;gap:12px;box-shadow:var(--shadow)}.match-card.has-odds{border-color:rgba(43,194,118,.65);box-shadow:0 0 0 1px rgba(43,194,118,.16),var(--shadow)}
.card-meta{display:flex;align-items:center;justify-content:space-between;gap:10px;color:var(--muted);font-size:12px;font-weight:700}.card-status{color:#77d59b}.odds-badge{display:inline-flex;align-items:center;height:22px;border-radius:999px;background:rgba(43,194,118,.14);border:1px solid rgba(43,194,118,.34);color:#74e1a5;padding:0 8px;font-size:12px;font-weight:800}.card-teams{display:grid;grid-template-columns:1fr auto 1fr;gap:12px;align-items:center}.card-team{text-align:center;min-width:0}.team-code{height:28px;display:flex;align-items:center;justify-content:center;font-size:18px;line-height:1;margin-bottom:7px;color:#d8e2eb;font-weight:800}.team-code.text{font-size:13px;letter-spacing:.4px}.card-name{font-size:16px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.card-time{text-align:center;min-width:82px;color:#d8e2eb;font-size:13px;line-height:1.55}.scoreline{display:block;font-size:23px;line-height:1.2;color:#fff;font-weight:800;margin-bottom:3px}.card-ai{border-top:1px solid rgba(255,255,255,.08);padding-top:10px;font-size:13px;color:#a7b6c5;line-height:1.5}.odds-row{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:8px}.odd-pill{border-radius:7px;background:rgba(255,255,255,.055);border:1px solid rgba(255,255,255,.08);padding:6px 7px;font-size:12px;font-weight:800;text-align:center}.odd-home{color:var(--green)}.odd-draw{color:var(--amber)}.odd-away{color:#5aa7ff}.ai-line{display:flex;justify-content:space-between;gap:10px;margin-top:5px;font-weight:700}.ai-line span:first-child{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.ai-line span:last-child{color:#64d69a;white-space:nowrap}.empty{border:1px dashed var(--line);border-radius:12px;padding:48px;text-align:center;color:var(--muted);grid-column:1/-1}
.backtop{position:fixed;right:22px;bottom:22px;z-index:60;width:42px;height:42px;border-radius:50%;border:1px solid var(--line);background:var(--surface-2);color:var(--text);font-size:22px;line-height:1;box-shadow:var(--shadow);opacity:0;pointer-events:none;transform:translateY(8px);transition:.18s ease}.backtop.show{opacity:1;pointer-events:auto;transform:translateY(0)}
.auth-modal{position:fixed;inset:0;z-index:100;display:none;align-items:center;justify-content:center;background:rgba(5,10,16,.62);padding:20px}.auth-modal.show{display:flex}.auth-panel{width:min(420px,100%);background:var(--bar);border:1px solid var(--line);border-radius:12px;box-shadow:var(--shadow);padding:22px}.auth-panel h2{font-size:20px;margin-bottom:16px}.auth-form{display:grid;gap:12px}.auth-form label{display:grid;gap:6px;color:var(--muted);font-size:13px;font-weight:700}.auth-form input{height:42px;border:1px solid var(--line);border-radius:9px;background:var(--surface-2);color:var(--text);padding:0 12px;outline:0}.auth-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:4px}.auth-actions button{height:36px;border-radius:9px;padding:0 14px;font-weight:800}.auth-cancel{border:1px solid var(--line);background:transparent;color:var(--text)}.auth-submit{border:1px solid var(--blue);background:var(--blue);color:#fff}.auth-message{min-height:18px;color:var(--muted);font-size:13px}.auth-message.error{color:var(--red)}.auth-message.ok{color:var(--green)}
.detail-modal{position:fixed;inset:0;z-index:90;display:none;background:rgba(5,10,16,.62);padding:20px;overflow:auto}.detail-modal.show{display:block}.detail-panel{width:min(1180px,100%);margin:26px auto;background:var(--bar);border:1px solid var(--line);border-radius:12px;box-shadow:var(--shadow);padding:22px}.detail-top{display:flex;align-items:flex-start;justify-content:space-between;gap:18px;margin-bottom:18px}.detail-title{font-size:22px;font-weight:800;line-height:1.25}.detail-sub{margin-top:6px;color:var(--muted);font-size:13px;font-weight:700}.detail-close{width:34px;height:34px;border-radius:8px;border:1px solid var(--line);background:var(--surface-2);color:var(--text);font-size:20px}.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}.detail-box{background:var(--surface);border:1px solid var(--line);border-radius:8px;padding:14px}.detail-box.wide{grid-column:1/-1}.detail-box h3{font-size:15px;margin-bottom:10px}.kv{display:grid;grid-template-columns:104px 1fr;gap:8px;font-size:13px;line-height:1.55}.kv span:nth-child(odd){color:var(--muted);font-weight:700}.detail-note{color:var(--muted);font-size:13px;line-height:1.6}.source-odds{display:grid;gap:9px}.source-row{border:1px solid var(--line-soft);border-radius:8px;padding:10px;background:rgba(255,255,255,.025)}.source-head{display:flex;justify-content:space-between;gap:12px;color:var(--muted);font-size:12px;font-weight:700;margin-bottom:8px}.source-line{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}.snapshot-table,.stats-table{width:100%;border-collapse:collapse;font-size:12px}.snapshot-table th,.snapshot-table td,.stats-table th,.stats-table td{padding:7px 6px;border-bottom:1px solid var(--line-soft);text-align:left}.snapshot-table th,.stats-table th{color:var(--muted);font-weight:800}.snapshot-price{font-weight:800;color:var(--green)}.event-list{display:grid;gap:7px}.event-item{display:grid;grid-template-columns:54px 1fr auto;gap:8px;align-items:center;font-size:13px;border-bottom:1px solid var(--line-soft);padding-bottom:7px}.lineups{display:grid;grid-template-columns:1fr 1fr;gap:14px}.lineup-team h4{font-size:13px;margin-bottom:8px}.lineup-team ol{padding-left:20px;color:var(--muted);font-size:12px;line-height:1.7}
.light .topbar{box-shadow:0 1px 0 rgba(18,32,46,.04),0 10px 26px rgba(18,32,46,.06)}.light .logo small{color:#64788b}.light .search{background:#f4f7fb;border-color:#cbd8e5;color:#52677a}.light .quick-btn{background:#fff;border-color:#cbd8e5;color:#172331}.light .quick-btn.active{background:#dbeafe;color:#0f5ec7}.light .match-card{background:#fff;border-color:#d7e1eb;box-shadow:0 10px 24px rgba(23,35,49,.08)}.light .match-card.has-odds{border-color:rgba(15,122,69,.55);box-shadow:0 0 0 1px rgba(15,122,69,.10),0 10px 24px rgba(23,35,49,.08)}.light .odds-badge{background:#e7f7ef;border-color:#b8e7ce;color:#0f7a45}.light .odd-pill{background:#f6f9fc;border-color:#e0e8f1}.light .card-meta{color:#657789}.light .card-status{color:#0f7a45}.light .team-code{color:#203142}.light .card-time{color:#34485c}.light .scoreline{color:#0b1622}.light .card-ai{border-top-color:#e2e9f1;color:#52677a}.light .ai-line span:last-child{color:#0f7a45}.light .empty{background:#fff;border-color:#cfd9e5;color:#5c7083}.light .detail-panel{background:#fff}.light .detail-box{background:#f8fafc;border-color:#dce5ee}
@media(max-width:1180px){.topbar{grid-template-columns:190px 1fr auto}.cards{grid-template-columns:repeat(3,minmax(0,1fr))}}
@media(max-width:900px){.cards{grid-template-columns:repeat(2,minmax(0,1fr))}.board-head{display:block}.summary{display:block;margin-top:10px}}
@media(max-width:760px){.detail-grid,.lineups{grid-template-columns:1fr}.detail-panel{margin:0 auto;padding:16px}.detail-modal{padding:10px}.detail-title{font-size:19px}}
@media(max-width:820px){.topbar{grid-template-columns:180px 1fr}.auth{grid-column:1/3;justify-content:flex-start}.topbar{height:116px;grid-template-rows:40px 42px}body{padding-top:116px}.search{grid-column:2;grid-row:1}.wrap{padding-top:18px}}
@media(max-width:680px){body{padding-top:158px}.topbar{height:158px;grid-template-columns:1fr;grid-template-rows:34px 40px 36px;padding:10px 14px}.logo{font-size:20px}.logo small{display:none}.auth{grid-column:1;grid-row:3;overflow:auto;justify-content:flex-start}.auth button{height:31px;padding:0 11px}.toggle-group{height:31px}.toggle-group button{height:29px;padding:0 9px}.search{grid-column:1;grid-row:2;height:40px}.wrap{padding:18px 14px 44px}.cards{grid-template-columns:1fr}.board-head h1{font-size:22px}.card-teams{gap:8px}.card-flag{font-size:27px}.card-name{font-size:15px}.card-time{min-width:66px}.tab{padding:0 12px}.backtop{right:14px;bottom:14px}}
@media(max-width:420px){.logo svg{width:28px;height:28px}.card-name{font-size:14px}}
</style>
</head>
<body>
<header class="topbar">
  <a class="logo" href="/"><svg viewBox="0 0 64 64" aria-hidden="true"><path d="M32 5 55 18v28L32 59 9 46V18L32 5Z" fill="#132337" stroke="#55a7ff" stroke-width="4"/><path d="M32 15v34M18 23l28 18M46 23 18 41" stroke="#8fd3ff" stroke-width="4" stroke-linecap="round"/></svg><span>AI智球</span><small>赛事研究</small></a>
  <label class="search"><span class="search-label" data-i18n="search">搜索</span><input id="searchInput" placeholder="球队、赛事、比赛时间、AI候选"></label>
  <div class="auth">
    <div class="toggle-group" aria-label="页面显示模式">
      <button data-theme="dark" class="active">黑夜</button>
      <button data-theme="light">白天</button>
    </div>
    <div class="toggle-group" aria-label="语言">
      <button data-lang="zh" class="active">中文</button>
      <button data-lang="en">EN</button>
    </div>
    <button class="login" id="loginBtn" data-i18n="login">登录</button><button class="signup" id="signupBtn" data-i18n="signup">注册</button>
  </div>
</header>

<main class="wrap">
  <section>
    <div class="board-head">
      <h1 data-i18n="board">赛事看板</h1>
      <span class="summary" id="summary">加载中...</span>
    </div>
    <div class="league-tabs" id="leagueTabs">
        <button class="tab active" data-league="worldcup" data-i18n="worldcup">世界杯</button>
        <button class="tab" data-league="epl" data-i18n="epl">英超</button>
    </div>
    <div class="quick-filters" id="quickFilters">
      <button class="quick-btn active" data-filter="recent7">📅 近 7 天</button>
      <button class="quick-btn" data-filter="with-odds">🔥 有指数</button>
      <button class="quick-btn" data-filter="finished">✅ 已结束</button>
      <button class="quick-btn" data-filter="all">🔍 全部</button>
    </div>
    <div id="sections"></div>
  </section>
</main>
<button class="backtop" id="backTop" aria-label="返回顶部">↑</button>
<div class="auth-modal" id="authModal" aria-hidden="true">
  <div class="auth-panel">
    <h2 id="authTitle">登录</h2>
    <form class="auth-form" id="authForm">
      <label><span id="displayNameLabel">显示名称</span><input id="displayNameInput" autocomplete="name"></label>
      <label><span id="emailLabel">邮箱</span><input id="emailInput" type="email" autocomplete="email" required></label>
      <label><span id="passwordLabel">密码</span><input id="passwordInput" type="password" autocomplete="current-password" minlength="8" required></label>
      <div class="auth-message" id="authMessage"></div>
      <div class="auth-actions"><button type="button" class="auth-cancel" id="authCancel">取消</button><button type="submit" class="auth-submit" id="authSubmit">登录</button></div>
    </form>
  </div>
</div>
<div class="detail-modal" id="detailModal" aria-hidden="true">
  <div class="detail-panel">
    <div class="detail-top">
      <div>
        <div class="detail-title" id="detailTitle"></div>
        <div class="detail-sub" id="detailSub"></div>
      </div>
      <button class="detail-close" id="detailClose" aria-label="关闭">×</button>
    </div>
    <div id="detailBody" class="detail-grid"></div>
  </div>
</div>

<script>
let allMatches=[],sourceMeta={},currentLeague='worldcup',currentQuickFilter='recent7',authMode='login';
let currentLang=localStorage.getItem('ai-football-lang')||'zh';
let currentTheme=localStorage.getItem('ai-football-theme')||'dark';
let authToken=localStorage.getItem('ai-football-token')||'';
let currentUser=null;

const dict={
  zh:{search:'搜索',searchPlaceholder:'球队、赛事、比赛时间、AI候选',login:'登录',signup:'注册',logout:'退出',board:'赛事看板',worldcup:'世界杯',epl:'英超',all:'全部',upcoming:'未开始',live:'进行中',finished:'已结束',count:'共 {n} 场 · 有指数 {o} 场',source:'数据源',empty:'暂无匹配赛事',synced:'赛程已同步',pending:'待评估',oddsPending:'指数未开放',oddsReady:'指数已接入，等待 AI 复评',reviewPending:'等待 AI 复评',aiPending:'AI分析待接入',wcScheduleReady:'FIFA 官方赛程已同步，开售后再生成正式建议',eplPublicReady:'英超公开赛程已接入，等待指数和球队模型补齐后生成建议',eplApiReady:'英超 API 数据已接入，AI分析暂未接入英超玩法',knockout:'淘汰赛',recent:'近期比赛',match:'比赛',round:'第 {n} 轮',group:'{g}组',rank:'{g}组第{r}',third:'小组第3（{g}组）',winner:'第{n}场胜者',runnerUp:'第{n}场负者',year:'2026年',statusLive:'进行中',statusFinished:'已结束',statusUpcoming:'未开始',displayName:'显示名称',email:'邮箱',password:'密码',cancel:'取消',authOk:'已登录',authError:'请求失败',quickRecent7:'📅 近 7 天',quickWithOdds:'🔥 有指数',quickFinished:'✅ 已结束',quickAll:'🔍 全部',oddsBadge:'有指数',finishedNote:'已结束',noOddsFuture:'指数未开放',noOddsPast:'历史比赛',timeTbd:'待定',detailLoading:'加载详情中...',basicInfo:'比赛信息',indexInfo:'实时指数',aiInfo:'AI分析',historyInfo:'指数历史',venue:'球场',city:'城市',stage:'阶段',status:'状态',bookmaker:'机构',updatedAt:'更新时间',noDetail:'暂无详情数据',noHistory:'暂无快照记录',noAnalysis:'暂无 AI 分析结果',upgradePro:'升级 pro 后查看完整解释、风险和备选方向',confidence:'信心',bestPick:'候选方向',risk:'风险'},

async function fetchJson(url){

  const r=await fetch(url,{cache:'no-store',headers});
  if(!r.ok)throw new Error(url+' '+r.status);
  return await r.json();
}
async function loadMatches(){

  const merged=[];sourceMeta={};
  for(const url of ['api/epl/matches','api/worldcup/matches','data/worldcup_matches.json']){

function league(m){return m.league||m.competition||''}

function zhName(value){
  if(!value)return '';
  if(currentLang==='en')return value;
  if(teamAliases[value])return teamAliases[value];
  if(nameMap[value])return nameMap[value];
  const normalized=value.replace(/\s+(FC|AFC)$/,'').replace(/^AFC\s+/,'').replace(/\s+CF$/,'');
  if(teamAliases[normalized])return teamAliases[normalized];
  if(nameMap[normalized])return nameMap[normalized];
  const groupRank=value.match(/^([123])([A-L])$/);
  if(groupRank)return t('rank',{g:groupRank[2],r:groupRank[1]});
  const third=value.match(/^3([A-L]+)$/);
  if(third)return t('third',{g:third[1]});
  const winner=value.match(/^W(\d+)$/);
  if(winner)return t('winner',{n:winner[1]});
  const runnerUp=value.match(/^RU(\d+)$/);
  if(runnerUp)return t('runnerUp',{n:runnerUp[1]});
  return value;
}

function groupRank(title){
  const g=title.match(/^([A-L])组$/);
  const ge=title.match(/^Group ([A-L])/);
  if(g)return groupOrder.indexOf(g[1]);
  if(ge)return groupOrder.indexOf(ge[1]);
  // Handle "第 N 轮" for league matchdays
  const md=title.match(/^第\s*(\d+)\s*轮$/);
  if(md)return parseInt(md[1],10);
  const stageRank={'小组赛':20,'三十二强':32,'十六强':40,'四分之一决赛':50,'半决赛':60,'三四名决赛':70,'决赛':80};
  const stageRankEn={'Group Stage':20,'Round of 32':32,'Round of 16':40,'Quarter-finals':50,'Semi-finals':60,'Third-place Play-off':70,'Final':80};
  return stageRank[title]||stageRankEn[title]||100;
}

  const from=quickRecent7From(),to=quickRecent7To();

}
function historicalStatsHtml(data){
  const payload=apiResponse(data,'historical_stats');
  if(!payload.stats)return `<div class="detail-note">${currentLang==='en'?'No historical stats synced yet':'历史统计暂未同步'}</div>`;
  const s=payload.stats||{},ft=s.full_time||{},ht=s.half_time||{},ms=s.match_stats||{};
  const rows=[
    [currentLang==='en'?'Source':'来源', payload.provider||'football-data.co.uk'],
    [currentLang==='en'?'Full time':'全场比分', `${ft.home_goals??'-'} - ${ft.away_goals??'-'} ${ft.result||''}`],
    [currentLang==='en'?'Half time':'半场比分', `${ht.home_goals??'-'} - ${ht.away_goals??'-'} ${ht.result||''}`],
    [currentLang==='en'?'Shots':'射门', `${ms.home_shots??'-'} - ${ms.away_shots??'-'}`],
    [currentLang==='en'?'Shots on target':'射正', `${ms.home_shots_on_target??'-'} - ${ms.away_shots_on_target??'-'}`],
    [currentLang==='en'?'Corners':'角球', `${ms.home_corners??'-'} - ${ms.away_corners??'-'}`],
    [currentLang==='en'?'Cards':'黄/红牌', `${ms.home_yellow_cards??'-'}/${ms.home_red_cards??'-'} - ${ms.away_yellow_cards??'-'}/${ms.away_red_cards??'-'}`],
  ];
  return detailRows(rows);
}
function lineupsHtml(data){
  const payload=apiResponse(data,'lineups');
  const rows=payload.response||payload.lineup||[];
  if(!rows.length)return `<div class="detail-note">阵容暂未同步</div>`;
  if(rows[0]&&rows[0].strPlayer){
    const byTeam=new Map();
    for(const row of rows){
      const team=row.strTeam||'球队';
      if(!byTeam.has(team))byTeam.set(team,[]);
      byTeam.get(team).push(row.strPlayer);
    }
    return `<div class="lineups">${[...byTeam.entries()].slice(0,2).map(([team,players])=>`<div class="lineup-team"><h4>${esc(team)}</h4><ol>${players.slice(0,11).map(name=>`<li>${esc(name)}</li>`).join('')}</ol></div>`).join('')}</div>`;
  }
  return `<div class="lineups">${rows.slice(0,2).map(team=>{
    const start=(team.startXI||[]).map(p=>(p.player||{}).name).filter(Boolean).slice(0,11);
    return `<div class="lineup-team"><h4>${esc((team.team||{}).name||'-')} · ${esc(team.formation||'')}</h4><ol>${start.map(name=>`<li>${esc(name)}</li>`).join('')}</ol></div>`;
  }).join('')}</div>`;
}
async function openDetail(leagueKey,id){
  const local=findLocalMatch(leagueKey,id);
  $('detailTitle').textContent=local?`${home(local)} vs ${away(local)}`:t('detailLoading');
  $('detailSub').textContent=local?`${leagueName(local)} · ${dateText(local)} ${local.time||''}`:'';
  $('detailBody').innerHTML=`<div class="detail-box"><div class="detail-note">${t('detailLoading')}</div></div>`;
  $('detailModal').classList.add('show');$('detailModal').setAttribute('aria-hidden','false');
  try{
    const data=await fetchJson(`api/matches/${leagueKey}/${encodeURIComponent(id)}`);
    renderDetail(data.match||local,data);
  }catch(e){
    if(local)renderDetail(local,{oddsSnapshots:[],analysisResults:[]});
    else $('detailBody').innerHTML=`<div class="detail-box"><div class="detail-note">${t('noDetail')}</div></div>`;
  }
}
function renderDetail(m,data){
  if(!m)return;
  $('detailTitle').textContent=`${home(m)} vs ${away(m)}`;
  $('detailSub').textContent=`${leagueName(m)} · ${dateText(m)} ${m.time||''}`;
  $('detailBody').innerHTML=`
    <div class="detail-box"><h3>${t('basicInfo')}</h3>${detailRows([[t('stage'),stageLabel(m.stage)||groupTitle(m)||'未公布'],[t('status'),statusName(m.status)],[t('venue'),m.venue||'未公布'],[t('city'),m.city||'未公布']])}</div>
    <div class="detail-box"><h3>${t('indexInfo')}</h3>${sourceOddsHtml(data.oddsSources,m)}</div>
    <div class="detail-box"><h3>${t('aiInfo')}</h3>${analysisHtml(data.analysisResults,m)}</div>
    <div class="detail-box"><h3>${t('historyInfo')}</h3>${snapshotsHtml(data.recentOddsBatch||data.oddsSnapshots)}</div>
    <div class="detail-box wide"><h3>${currentLang==='en'?'Official Public Reference':'官方公开参考'}</h3>${officialMarketHtml(data)}</div>
    <div class="detail-box wide"><h3>${currentLang==='en'?'Historical Data':'历史数据'}</h3>${historicalStatsHtml(data)}</div>
    <div class="detail-box wide"><h3>赛况事件</h3>${eventsHtml(data)}</div>
    <div class="detail-box wide"><h3>技术统计</h3>${statisticsHtml(data)}</div>
    <div class="detail-box wide"><h3>阵容</h3>${lineupsHtml(data)}</div>`;
}
function closeDetail(){$('detailModal').classList.remove('show');$('detailModal').setAttribute('aria-hidden','true')}
function card(m){
  const pct=conf(m);
  const homeTop=isEPL(m)?`<div class="team-code text">${teamCode(m,'home')}</div>`:`<div class="team-code">${flag(m.home)}</div>`;
  const awayTop=isEPL(m)?`<div class="team-code text">${teamCode(m,'away')}</div>`:`<div class="team-code">${flag(m.away)}</div>`;
  const leagueKey=isWC(m)?'worldcup':'epl';
  return `<article class="match-card ${hasOdds(m)?'has-odds':''}" data-match-id="${esc(m.id)}" data-league-key="${leagueKey}" tabindex="0"><div class="card-meta"><span>${stageLabel(m.stage)||leagueName(m)}</span>${statusBadge(m)}</div><div class="card-teams"><div class="card-team">${homeTop}<div class="card-name">${home(m)}</div></div><div class="card-time">${centerText(m)}</div><div class="card-team">${awayTop}<div class="card-name">${away(m)}</div></div></div><div class="card-ai"><div>${pickDesc(m)}</div>${oddsHtml(m)}<div class="ai-line"><span>${pickLabel(m)}</span><span>${pct?pct+'%':t('pending')}</span></div></div></article>`;
}
function setLeague(value){currentLeague=value;document.querySelectorAll('[data-league]').forEach(el=>el.classList.toggle('active',el.dataset.league===value));render()}
function setQuickFilter(value){currentQuickFilter=value;document.querySelectorAll('[data-filter]').forEach(el=>el.classList.toggle('active',el.dataset.filter===value));render()}
function setTheme(value){currentTheme=value;localStorage.setItem('ai-football-theme',value);document.body.classList.toggle('light',value==='light');document.querySelectorAll('[data-theme]').forEach(el=>el.classList.toggle('active',el.dataset.theme===value))}
function setLang(value){currentLang=value;localStorage.setItem('ai-football-lang',value);document.documentElement.lang=value==='en'?'en':'zh-CN';document.querySelectorAll('[data-lang]').forEach(el=>el.classList.toggle('active',el.dataset.lang===value));document.querySelectorAll('[data-i18n]').forEach(el=>{el.textContent=t(el.dataset.i18n)});$('searchInput').placeholder=t('searchPlaceholder');updateAuthText();updateQuickFilterText();render()}
function updateQuickFilterText(){
  const labels={recent7:t('quickRecent7'),'with-odds':t('quickWithOdds'),finished:t('quickFinished'),all:t('quickAll')};
  document.querySelectorAll('[data-filter]').forEach(btn=>{
    const label=labels[btn.dataset.filter];
    if(label)btn.textContent=label;
  });
}
function updateAuthText(){ $('displayNameLabel').textContent=t('displayName');$('emailLabel').textContent=t('email');$('passwordLabel').textContent=t('password');$('authCancel').textContent=t('cancel');$('authTitle').textContent=t(authMode);$('authSubmit').textContent=t(authMode);if(currentUser){$('loginBtn').textContent=currentUser.displayName||currentUser.email;$('signupBtn').textContent=t('logout')}else{$('loginBtn').textContent=t('login');$('signupBtn').textContent=t('signup')}}
function openAuth(mode){authMode=mode;$('authMessage').textContent='';$('authMessage').className='auth-message';$('displayNameInput').parentElement.style.display=mode==='signup'?'grid':'none';$('authModal').classList.add('show');$('authModal').setAttribute('aria-hidden','false');updateAuthText();setTimeout(()=>$('emailInput').focus(),0)}
function closeAuth(){$('authModal').classList.remove('show');$('authModal').setAttribute('aria-hidden','true')}
async function submitAuth(event){event.preventDefault();const payload={email:$('emailInput').value,password:$('passwordInput').value};if(authMode==='signup')payload.displayName=$('displayNameInput').value;const res=await fetch(`/api/auth/${authMode==='signup'?'register':'login'}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});const data=await res.json().catch(()=>({}));if(!res.ok){$('authMessage').textContent=data.error||t('authError');$('authMessage').className='auth-message error';return}authToken=data.token;currentUser=data.user;localStorage.setItem('ai-football-token',authToken);$('authMessage').textContent=t('authOk');$('authMessage').className='auth-message ok';updateAuthText();setTimeout(closeAuth,400)}
async function loadMe(){if(!authToken)return;const res=await fetch('/api/auth/me',{headers:{Authorization:`Bearer ${authToken}`}});if(!res.ok){localStorage.removeItem('ai-football-token');authToken='';currentUser=null;updateAuthText();return}const data=await res.json();currentUser=data.user;updateAuthText()}
document.querySelectorAll('[data-league]').forEach(btn=>btn.addEventListener('click',()=>setLeague(btn.dataset.league)));
document.querySelectorAll('[data-filter]').forEach(btn=>btn.addEventListener('click',()=>setQuickFilter(btn.dataset.filter)));
document.querySelectorAll('[data-theme]').forEach(btn=>btn.addEventListener('click',()=>setTheme(btn.dataset.theme)));
document.querySelectorAll('[data-lang]').forEach(btn=>btn.addEventListener('click',()=>setLang(btn.dataset.lang)));
$('loginBtn').addEventListener('click',()=>currentUser?null:openAuth('login'));
$('signupBtn').addEventListener('click',()=>{if(currentUser){authToken='';currentUser=null;localStorage.removeItem('ai-football-token');updateAuthText()}else openAuth('signup')});
$('authCancel').addEventListener('click',closeAuth);
$('authModal').addEventListener('click',e=>{if(e.target===$('authModal'))closeAuth()});
$('authForm').addEventListener('submit',submitAuth);
$('sections').addEventListener('click',e=>{const card=e.target.closest('.match-card');if(card)openDetail(card.dataset.leagueKey,card.dataset.matchId)});
$('sections').addEventListener('keydown',e=>{if(e.key==='Enter'){const card=e.target.closest('.match-card');if(card)openDetail(card.dataset.leagueKey,card.dataset.matchId)}});
$('detailClose').addEventListener('click',closeDetail);
$('detailModal').addEventListener('click',e=>{if(e.target===$('detailModal'))closeDetail()});
$('searchInput').addEventListener('input',render);
$('backTop').addEventListener('click',()=>scrollTo({top:0,behavior:'smooth'}));
addEventListener('scroll',()=>$('backTop').classList.toggle('show',scrollY>360),{passive:true});
async function refreshMatches(){allMatches=await loadMatches();render()}
setTheme(currentTheme);
setLang(currentLang);
loadMe();
refreshMatches();
setInterval(refreshMatches,120000);
</script>
</body>
</html>
